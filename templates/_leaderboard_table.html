{% if rows %}
<table>
  <thead>
    <tr><th>#</th><th>Name</th><th>XP</th><th>Streak</th><th>League</th><th>Languages</th></tr>
  </thead>
  <tbody>
    {% for row in rows %}
    <tr>
      <td>{{ loop.index }}</td>
      <td>{{ row.real_name }}</td>
      <td>{{ row.xp }}</td>
      <td>{{ row.streak }} 🔥</td>
      <td>{{ row.league or "—" }}</td>
      <td>{{ row.languages | join(", ") }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<p class="empty">No data yet. <a href="/join">Be the first to join!</a></p>
{% endif %}
