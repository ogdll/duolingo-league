{% extends "base.html" %}
{% block content %}
<h1>Leaderboard</h1>

<div class="tabs">
  {% for p, label in [("day","Today"), ("week","This Week"), ("month","This Month"), ("alltime","All Time")] %}
  <button class="tab {% if period == p %}active{% endif %}" data-period="{{ p }}">{{ label }}</button>
  {% endfor %}
</div>

<div id="leaderboard-wrap">
  {% include "_leaderboard_table.html" %}
</div>

<script>
  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '—' : String(str);
    return d.innerHTML;
  }

  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', async () => {
      document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const period = btn.dataset.period;
      const resp = await fetch(`/api/leaderboard?period=${period}`);
      const rows = await resp.json();
      const wrap = document.getElementById('leaderboard-wrap');
      if (!rows.length) {
        wrap.innerHTML = '<p class="empty">No data yet. <a href="/join">Be the first to join!</a></p>';
        return;
      }
      const table = document.createElement('table');
      table.innerHTML = '<thead><tr><th>#</th><th>Name</th><th>XP</th><th>Streak</th><th>League</th><th>Languages</th></tr></thead>';
      const tbody = document.createElement('tbody');
      rows.forEach((r, i) => {
        const tr = document.createElement('tr');
        [
          i + 1,
          r.real_name,
          r.xp,
          (r.streak || 0) + ' 🔥',
          r.league || '—',
          (r.languages || []).join(', ')
        ].forEach(val => {
          const td = document.createElement('td');
          td.textContent = val;
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.replaceChildren(table);
    });
  });
</script>
{% endblock %}
